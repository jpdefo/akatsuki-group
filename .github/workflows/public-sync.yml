name: Refresh public snapshot

on:
  schedule:
    - cron: "23 9 * * *"
  workflow_dispatch:
    inputs:
      full_history:
        description: "Scrape full giveaway history instead of only recent pages"
        required: false
        default: false
        type: boolean
      full_refresh:
        description: "Refresh the full active-member Steam history instead of the latest month"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: public-sync
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install browser sync dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape public SteamGifts group
        env:
          FULL_HISTORY: ${{ github.event_name == 'workflow_dispatch' && inputs.full_history || 'false' }}
        run: |
          if [ "$FULL_HISTORY" = "true" ]; then
            npm run public-sync -- --full-history
          else
            npm run public-sync
          fi

      - name: Merge sync and refresh Steam data
        env:
          FULL_REFRESH: ${{ github.event_name == 'workflow_dispatch' && inputs.full_refresh || 'false' }}
          STEAM_WEB_API_KEY: ${{ secrets.STEAM_WEB_API_KEY }}
        run: |
          python server.py --merge-sync-file data/steamgifts-sync.public.json
          if [ -n "$STEAM_WEB_API_KEY" ]; then
            if [ "$FULL_REFRESH" = "true" ]; then
              python server.py --refresh-steam-progress --full-refresh
            else
              python server.py --refresh-steam-progress
            fi
          else
            echo "STEAM_WEB_API_KEY is not configured; skipping Steam progress refresh."
          fi

      - name: Remove temporary public sync payload
        run: rm -f data/steamgifts-sync.public.json

      - name: Commit refreshed snapshot data
        run: |
          if git diff --quiet -- data; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Refresh public snapshot data" -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push
